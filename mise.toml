[tools]

# Core dependencies
go = "1.24.13"
golangci-lint = "1.64.8"
gotestsum = "1.12.3"
mockery = "2.53.3"
rust = "1.94"
python = "3.12.0"
uv = "0.5.5"
jq = "1.7.1"
yq = "4.44.5"
shellcheck = "0.10.0"
shfmt = "3.11.0"
direnv = "2.35.0"
just = "1.37.0"

svm-rs = "0.5.19"

# Go dependencies
"go:github.com/ethereum/go-ethereum/cmd/abigen" = "1.15.10"
"go:github.com/ethereum/go-ethereum/cmd/geth" = "1.16.4" # Osaka testnet release.

# Python dependencies
"pipx:slither-analyzer" = "0.10.2"
"pipx:semgrep" = "1.90.0"
"pipx:md_toc" = "9.0.0"

# Foundry dependencies
# Foundry is a special case because it supplies multiple binaries at the same
# GitHub release, so we need to use the aliasing trick to get mise to not error
# The git ref here should be on the `stable` branch.
# Updated to use the specific nightly build
forge = "1.2.3"
cast = "1.2.3"
anvil = "1.2.3"

# Other dependencies
codecov-uploader = "0.8.0"
goreleaser-pro = "2.11.2"
kurtosis = "1.8.1"
op-acceptor = "op-acceptor/v3.6.6"

# Fake dependencies
# Put things here if you need to track versions of tools or projects that can't
# actually be managed by mise (yet). Make sure that anything you put in here is
# also found inside of disabled_tools or mise will try to install it.
asterisc = "1.3.0"
kontrol = "1.0.90"
binary_signer = "1.0.4"

[tool_alias]
forge = "github:foundry-rs/foundry[exe=forge]"
cast = "github:foundry-rs/foundry[exe=cast]"
anvil = "github:foundry-rs/foundry[exe=anvil]"
just = "github:casey/just"
codecov-uploader = "github:codecov/uploader"
goreleaser-pro = "github:goreleaser/goreleaser-pro[exe=goreleaser]"
gotestsum = "github:gotestyourself/gotestsum"
kurtosis = "github:kurtosis-tech/kurtosis-cli-release-artifacts[exe=kurtosis]"
mockery = "github:vektra/mockery"
op-acceptor = "github:ethereum-optimism/infra[exe=op-acceptor,tag_prefix=op-acceptor/]"
svm-rs = "github:alloy-rs/svm-rs[exe=svm]"

# These are disabled, but latest mise versions error if they don't have a known
# install source even though it won't ever actually use that source.
asterisc = "github:ethereum-optimism/fake-asterisc"
kontrol = "github:ethereum-optimism/fake-kontrol"
binary_signer = "github:ethereum-optimism/fake-binary_signer"

[settings]
experimental = true
pipx.uvx = true
disable_tools = ["asterisc", "kontrol", "binary_signer"]
# Python 3.12.0 predates GitHub artifact attestations; disable verification
# to avoid "No GitHub artifact attestations found" errors in mise ≥2026.4
python.github_attestations = false
