[files]
extend-exclude = [
    ".git",
    "target",
    "Cargo.lock",
    "kona/docker/recipes/kona-node-dev/kona-node/bootstores",
    "op-alloy/book/mermaid*.js",
    "op-alloy/book/dist/",
    "op-alloy/book/theme/",
    "*.min.js",
    "op-alloy/CHANGELOG.md",
    "op-reth/crates/storage/libmdbx-rs/mdbx-sys/libmdbx",
    "op-reth/testing/ef-tests",
]

[default]
extend-ignore-re = [
    # Hex strings of various lengths
    "(?i)0x[0-9a-f]{8,}",
    "(?i)[0-9a-f]{32,}",
    "(?i)[0-9a-f]{8}",
    "(?i)[0-9a-f]{40}",
    "(?i)[0-9a-f]{64}",
    # Ordinals in identifiers
    "[0-9]+nd",
    "[0-9]+th",
    "[0-9]+st",
    "[0-9]+rd",
    # Base64 encoded strings (common in tests and configs)
    "[A-Za-z0-9+/]{20,}={0,2}",
]

