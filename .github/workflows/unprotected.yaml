name: docker-build (PR)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: docker-build-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: gas-oracle
            dockerfile: gas-oracle/Dockerfile
          - image_name: op-batcher
            dockerfile: op-batcher/Dockerfile
          - image_name: op-node
            dockerfile: op-node/Dockerfile
          - image_name: op-proposer
            dockerfile: op-proposer/Dockerfile
    steps:
      - name: harden-runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          provenance: false
          tags: mantle-ci/${{ matrix.image_name }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            VERSION=${{ github.sha }}
