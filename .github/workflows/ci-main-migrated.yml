name: ci-main (migrated from CircleCI)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      contracts_bedrock: ${{ steps.filter.outputs.contracts_bedrock }}
      main_go: ${{ steps.filter.outputs.main_go }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect CI-relevant changes
        id: filter
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
            changed_files="$(git diff --name-only --diff-filter=ACMRTUXB "origin/$GITHUB_BASE_REF...HEAD")"
          elif [ "$GITHUB_EVENT_NAME" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only --diff-filter=ACMRTUXB "$BEFORE_SHA...$GITHUB_SHA")"
          else
            changed_files=""
          fi

          echo "Changed files:"
          if [ -n "$changed_files" ]; then
            printf '%s\n' "$changed_files"
          else
            echo "<treating as full run>"
          fi

          has_match() {
            local pattern="$1"

            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              echo true
              return
            fi

            if [ -z "$changed_files" ]; then
              echo false
            elif printf '%s\n' "$changed_files" | grep -Eq "$pattern"; then
              echo true
            else
              echo false
            fi
          }

          contracts_bedrock="$(has_match '^(\.github/workflows/ci-main-migrated\.yml|packages/contracts-bedrock/|op-node/)')"
          main_go="$(has_match '^(go\.(mod|sum)$|gas-oracle/|op-batcher/|op-chain-ops/|op-node/|op-proposer/|op-service/|op-e2e/mantleopgeth/|op-e2e/actions/mantletests/|op-e2e/actions/mantleupgrades/|op-e2e/system/mantleda/|op-e2e/system/mantlep2p/|op-acceptance-tests/|op-devstack/|devnet-sdk/)')"

          echo "contracts_bedrock=$contracts_bedrock"
          echo "main_go=$main_go"

          echo "contracts_bedrock=$contracts_bedrock" >> "$GITHUB_OUTPUT"
          echo "main_go=$main_go" >> "$GITHUB_OUTPUT"

  contracts-bedrock-build:
    name: contracts-bedrock-build
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.contracts_bedrock == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Install contracts dependencies
        run: git submodule update --init --recursive --force -j 8
      - name: Build contracts (ci profile)
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: ci
        run: |
          just forge-build --deny-warnings --skip test
      - name: Copy artifacts into op-deployer
        working-directory: op-deployer
        run: just copy-contract-artifacts
      - name: Save forge artifacts to cache
        uses: actions/cache/save@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
            op-deployer/pkg/deployer/artifacts/forge-artifacts
          key: forge-artifacts-${{ github.sha }}

  contracts-bedrock-tests-heavy-fuzz-modified:
    name: contracts-bedrock-tests-heavy-fuzz-modified
    needs:
      - detect-changes
      - contracts-bedrock-build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.contracts_bedrock == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Install contracts dependencies
        run: git submodule update --init --recursive --force -j 8
      - name: Restore forge artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
          key: forge-artifacts-${{ github.sha }}
      - name: Build go-ffi
        run: go build -o ./packages/contracts-bedrock/scripts/go-ffi/go-ffi ./packages/contracts-bedrock/scripts/go-ffi/
      - name: Run heavy fuzz tests for modified test files
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: ciheavy
        run: |
          git fetch --no-tags --depth=1 origin main
          TEST_FILES=$(git diff origin/main...HEAD --name-only --diff-filter=AM -- 'packages/contracts-bedrock/test/**/*.t.sol' | sed 's|packages/contracts-bedrock/||')
          if [ -z "$TEST_FILES" ]; then
            echo "No modified contract test files found, skipping."
            exit 0
          fi
          TEST_FILES=$(echo "$TEST_FILES" | sed 's|^test/||')
          MATCH_PATH="./test/{$(echo "$TEST_FILES" | paste -sd "," -)}"
          forge test --match-path "$MATCH_PATH"
      - name: Print failed test traces
        if: failure()
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: ciheavy
        run: |
          if [ -d ./scripts/go-ffi ]; then
            just test-rerun
          else
            echo "Skipping rerun: packages/contracts-bedrock/scripts/go-ffi is not present in this repo."
          fi
      - name: Lint forge test names
        working-directory: packages/contracts-bedrock
        run: |
          if [ -d ./scripts/checks/test-validation ]; then
            just lint-forge-tests-check-no-build
          else
            echo "Skipping forge test lint: packages/contracts-bedrock/scripts/checks/test-validation is not present in this repo."
          fi

  contracts-bedrock-tests:
    name: contracts-bedrock-tests
    needs:
      - detect-changes
      - contracts-bedrock-build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: needs.detect-changes.outputs.contracts_bedrock == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Install contracts dependencies
        run: git submodule update --init --recursive --force -j 8
      - name: Restore forge artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
          key: forge-artifacts-${{ github.sha }}
      - name: Build go-ffi
        run: go build -o ./packages/contracts-bedrock/scripts/go-ffi/go-ffi ./packages/contracts-bedrock/scripts/go-ffi/
      - name: Run contracts tests
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: ci
        run: |
          forge test --match-path "./test/**/*.t.sol"

  contracts-bedrock-upload:
    name: contracts-bedrock-upload
    if: needs.detect-changes.outputs.contracts_bedrock == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - detect-changes
      - contracts-bedrock-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Install contracts dependencies
        run: git submodule update --init --recursive --force -j 8
      - name: Restore forge artifacts from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
          key: forge-artifacts-${{ github.sha }}
      - name: Update selectors
        working-directory: packages/contracts-bedrock
        run: just update-selectors

  op-deployer-forge-version:
    name: op-deployer-forge-version
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Check forge version in op-deployer
        working-directory: op-deployer
        run: just check-forge-version

  semgrep-scan-local:
    name: semgrep-scan-local
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run semgrep local rules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          semgrep scan --timeout=100 --config .semgrep/rules/ --error .

  semgrep-test:
    name: semgrep-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run semgrep tests
        run: semgrep scan --test --config .semgrep/rules/ .semgrep/tests/

  go-lint:
    name: go-lint
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.main_go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Restore forge artifacts from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
            op-deployer/pkg/deployer/artifacts/forge-artifacts
          key: forge-artifacts-${{ github.sha }}
      - name: Build contract artifacts on cache miss
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd packages/contracts-bedrock && just build-no-tests
          cd ../../op-deployer && just copy-contract-artifacts
      - name: Restore golangci-lint cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-v1-${{ hashFiles('.golangci.yaml') }}
      - name: Run Go lint
        run: make lint-go

  fuzz-golang:
    name: fuzz-golang-${{ matrix.package_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        package_name:
          - op-node
          - op-service
          - op-chain-ops
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Install parallel
        run: sudo apt-get update && sudo apt-get install -y parallel
      - name: Run Go fuzz target
        working-directory: ${{ matrix.package_name }}
        run: make fuzz
      - name: Collect fuzz artifacts
        if: always()
        run: |
          mkdir -p fuzzdata
          find "./${{ matrix.package_name }}" -type d -name "fuzz" -exec sh -c 'cp -r "{}"/* fuzzdata/ 2>/dev/null || true' \;
      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzdata-${{ matrix.package_name }}
          path: fuzzdata

  go-tests:
    name: go-tests
    needs:
      - detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: needs.detect-changes.outputs.main_go == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Restore forge artifacts from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
            op-deployer/pkg/deployer/artifacts/forge-artifacts
          key: forge-artifacts-${{ github.sha }}
      - name: Build contract artifacts on cache miss
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd packages/contracts-bedrock && just build-no-tests
          cd ../../op-deployer && just copy-contract-artifacts
      - name: Run Go tests
        env:
          TEST_TIMEOUT: 20m
        run: make mantle-tests-ci

  check-generated-mocks-op-node:
    name: check-generated-mocks-op-node
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Check generated mocks for op-node
        run: make generate-mocks-op-node && git diff --exit-code

  check-generated-mocks-op-service:
    name: check-generated-mocks-op-service
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Check generated mocks for op-service
        run: make generate-mocks-op-service && git diff --exit-code

  todo-issues-check:
    name: todo-issues-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check TODO issues
        run: ./ops/scripts/todo-checker.sh --verbose --strict

  shell-check:
    name: shell-check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Run shellcheck + shfmt validation
        run: just shellcheck

  docker-build:
    name: docker-build (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: gas-oracle
            dockerfile: gas-oracle/Dockerfile
          - image_name: op-batcher
            dockerfile: op-batcher/Dockerfile
          - image_name: op-node
            dockerfile: op-node/Dockerfile
          - image_name: op-proposer
            dockerfile: op-proposer/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          provenance: false
          tags: mantle-ci/${{ matrix.image_name }}:${{ github.sha }}
          build-args: |
            VERSION=${{ github.sha }}

  op-acceptance-tests:
    name: op-acceptance-tests
    runs-on: ubuntu-latest
    timeout-minutes: 150
    needs:
      - detect-changes
      - contracts-bedrock-build
    if: needs.detect-changes.outputs.main_go == 'true'
    env:
      GOFLAGS: "-mod=mod"
      GO111MODULE: "on"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2

      - name: Install contracts dependencies
        run: git submodule update --init --recursive --force -j 8
      - name: Restore forge artifacts from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
            op-deployer/pkg/deployer/artifacts/forge-artifacts
          key: forge-artifacts-${{ github.sha }}
      - name: Build contract artifacts on cache miss
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd packages/contracts-bedrock && just build-no-tests
          cd ../../op-deployer && just copy-contract-artifacts

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-v1-${{ hashFiles('go.sum') }}
          restore-keys: go-mod-v1-

      - name: Download Go dependencies
        working-directory: op-acceptance-tests
        run: go mod download

      - name: Run mantle-base acceptance tests (sysgo)
        working-directory: op-acceptance-tests
        timeout-minutes: 60
        run: LOG_LEVEL=info just acceptance-test "" "mantle-base"

      - name: Print results (summary)
        if: always()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          cat "$LOG_DIR/summary.log" || true

      - name: Print results (failures)
        if: failure()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          cat "$LOG_DIR/failed/*.log" || true

      - name: Print results (all)
        if: always()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          cat "$LOG_DIR/all.log" || true

      - name: Generate JUnit XML test report
        if: always()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          gotestsum --junitfile results/results.xml --raw-command cat $LOG_DIR/raw_go_events.log || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-results
          path: op-acceptance-tests/results

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-logs
          path: op-acceptance-tests/logs

  op-acceptance-tests-reth:
    name: op-acceptance-tests (reth)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs:
      - detect-changes
      - contracts-bedrock-build
    if: needs.detect-changes.outputs.main_go == 'true'
    env:
      GOFLAGS: "-mod=mod"
      GO111MODULE: "on"
      DEVSTACK_L2EL_KIND: "op-reth"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2

      - name: Install op-reth
        env:
          OP_RETH_VERSION: "v2.2.1"
        run: |
          set -euo pipefail
          TARBALL="op-reth-${OP_RETH_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          URL="https://github.com/mantle-xyz/reth/releases/download/${OP_RETH_VERSION}/${TARBALL}"
          echo "Downloading op-reth ${OP_RETH_VERSION} from ${URL}"
          curl -fsSL "${URL}.sha256" -o "${TARBALL}.sha256"
          curl -fsSL "$URL" -o "$TARBALL"
          sha256sum -c "${TARBALL}.sha256"
          tar xzf "$TARBALL"
          sudo install -m 755 op-reth /usr/local/bin/op-reth
          op-reth --version

      - name: Install contracts dependencies
        run: git submodule update --init --recursive --force -j 8
      - name: Restore forge artifacts from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/contracts-bedrock/forge-artifacts
            packages/contracts-bedrock/cache
            op-deployer/pkg/deployer/artifacts/forge-artifacts
          key: forge-artifacts-${{ github.sha }}
      - name: Build contract artifacts on cache miss
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd packages/contracts-bedrock && just build-no-tests
          cd ../../op-deployer && just copy-contract-artifacts

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-v1-${{ hashFiles('go.sum') }}
          restore-keys: go-mod-v1-

      - name: Download Go dependencies
        working-directory: op-acceptance-tests
        run: go mod download

      - name: Run mantle-base acceptance tests (reth)
        working-directory: op-acceptance-tests
        timeout-minutes: 60
        env:
          OP_RETH_EXEC_PATH: /usr/local/bin/op-reth
        run: LOG_LEVEL=info just acceptance-test "" "mantle-base"

      - name: Print results (summary)
        if: always()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          cat "$LOG_DIR/summary.log" || true

      - name: Print results (failures)
        if: failure()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          cat "$LOG_DIR/failed/*.log" || true

      - name: Print results (all)
        if: always()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          cat "$LOG_DIR/all.log" || true

      - name: Generate JUnit XML test report
        if: always()
        working-directory: op-acceptance-tests
        run: |
          LOG_DIR=$(ls -td -- logs/* | head -1)
          gotestsum --junitfile results/results-reth.xml --raw-command cat $LOG_DIR/raw_go_events.log || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-results-reth
          path: op-acceptance-tests/results

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-logs-reth
          path: op-acceptance-tests/logs

  solidity-fmt-check:
    name: solidity-fmt-check
    needs:
      - detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.contracts_bedrock == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain via mise
        uses: jdx/mise-action@v2
      - name: Check forge fmt on changed .sol files
        working-directory: packages/contracts-bedrock
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          CHANGED_SOL=$(git diff --name-only --diff-filter=ACMR "origin/$GITHUB_BASE_REF...HEAD" -- '*.sol' | grep '^packages/contracts-bedrock/' | sed 's|^packages/contracts-bedrock/||' || true)
          if [ -z "$CHANGED_SOL" ]; then
            echo "No changed .sol files, skipping."
            exit 0
          fi
          echo "Checking formatting for:"
          echo "$CHANGED_SOL"
          echo "$CHANGED_SOL" | xargs forge fmt --check

  main-ci-summary:
    name: main-ci-summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - contracts-bedrock-build
      - contracts-bedrock-tests-heavy-fuzz-modified
      - contracts-bedrock-tests
      - contracts-bedrock-upload
      - op-deployer-forge-version
      - semgrep-scan-local
      - semgrep-test
      - go-lint
      - fuzz-golang
      - go-tests
      - check-generated-mocks-op-node
      - check-generated-mocks-op-service
      - todo-issues-check
      - solidity-fmt-check
      - shell-check
      - docker-build
      - op-acceptance-tests
      - op-acceptance-tests-reth
    steps:
      - name: Validate job statuses
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq .
          echo "$NEEDS_JSON" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")' >/dev/null
