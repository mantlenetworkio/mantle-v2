# Configuration file for acceptance tests (op-acceptor)
#
# All acceptance tests need to be registered here for op-acceptor to run them.
# As a rule of thumb, we recommend that each fork gate inherits from the
# base gate as well as any earlier fork gates.

gates:
  # New tests should be added here first with an owner metadata.
  # Once we're confident they're not flaky, a PR will be automatically created to remove them from this gate.
  # Example entry format:
  # - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/parallelism
  #   timeout: 10m
  #   metadata:
  #     owner: "team-infra"
  - id: flake-shake
    description: "Quarantine gate for new and potentially flaky tests requiring stability validation."
    tests:
  - id: isthmus
    description: "Isthmus network tests."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/isthmus
        timeout: 6h
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/isthmus/operator_fee
        timeout: 6h
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/isthmus/withdrawal_root
        timeout: 20m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/isthmus/erc20_bridge
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/isthmus/pectra
        timeout: 10m

  - id: base
    description: "Sanity/smoke acceptance tests for all networks."
    inherits:
      - isthmus
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/base
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/base/deposit
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/base/chain
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/ecotone
        timeout: 10m
      # TODO(infra#401): Re-enable the test when the sysext missing toolset is implemented
      #- package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/base/withdrawal
      #  timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/fjord

  - id: conductor
    description: "Sanity/smoke acceptance tests for networks with conductors."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/base/conductor
        timeout: 10m

  - id: pre-interop
    inherits:
      - base
    description: "Pre-interop network tests."
    tests:
      - name: TestInteropReadiness
        package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/isthmus/preinterop
        timeout: 20m

  - id: interop
    inherits:
      - base
    description: "Interop network tests."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/interop
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/interop/message
        timeout: 30m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/interop/sync
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/interop/smoke
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/interop/contract

  - id: interop-loadtest
    description: "Interop network loadtests."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/interop/loadtest
        timeout: 10m

  - id: flashblocks
    inherits:
      - base
    description: "Flashblocks network tests."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/flashblocks
        timeout: 5m

  - id: flashblocks-with-isthmus
    inherits:
      - base
    description: "Flashblocks network tests with Isthmus."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/flashblocks
        timeout: 5m

  - id: sync-test-op-node
    description: "Sync tests for op-node with external networks via the op-sync-tester - tests run daily."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/sync_tester/sync_tester_ext_el
        timeout: 30m

  - id: jovian
    inherits:
      - base
    description: "Jovian network tests."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/jovian/...
        timeout: 10m

  - id: cgt
    description: "Custom Gas Token (CGT) network tests."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/tests/custom_gas_token
        timeout: 10m

  - id: mantle-temp
    description: "Temporary gate for re-running failed tests."
    tests:
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base/deposit
        timeout: 10m

  # ── Mantle Public Network ────────────────────────────────────
  # Tests that can run on any external network (public or fork).
  # Only needs: L1/L2 RPC endpoints + funded faucet wallets.
  # No admin keys, no infrastructure control, no TimeTravel.

  - id: mantle-public
    description: "Mantle tests for public/external networks — standard tx, RPC reads, deposits. No admin keys or infra control."
    tests:
      # Smoke / base — RPC connectivity, faucet, block advance
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base
        name: TestFaucetFund
        timeout: 5m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base
        name: TestRPCConnectivity
        timeout: 5m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base
        name: TestCLAdvance
        timeout: 5m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base
        name: TestPublicRpcAdvance
        timeout: 5m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base/chain
        timeout: 5m
      # Arsia — deploy contracts, send txs, read state, bridge
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestCalldataCost
        timeout: 5m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestCheckArsiaScript
        timeout: 5m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestERC20Bridge
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestWithdrawalRoot
        timeout: 5m
      # EstimateTotalFee — only tests that do NOT call SetOperatorFee or use vault balance diffs
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_Smoke
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_TransactionTypes
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_FeeParams
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_BlockParam
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_ErrorHandling
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_CrossValidation
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_ControlVariable
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_ContractInteractions
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_Performance
        timeout: 10m

  # ── Mantle Public Serial ──────────────────────────────────────
  # Tests that can run on public networks but compare vault balance diffs,
  # so they must run with --serial to avoid interference from concurrent txs.

  - id: mantle-public-serial
    description: "Mantle tests requiring --serial — shared faucet nonce or vault balance diff calculations."
    tests:
      # Deposit (L1→L2) — shares l1MNTFaucet key, nonce conflicts if parallel
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base/deposit
        timeout: 10m
      # Transfer — validates fee distribution to vaults via balance diffs
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base
        name: TestTransfer
        timeout: 5m
      # L1FeeAccuracy — compares estimateTotalFee vs actual cost using vault diffs
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_L1FeeAccuracy
        timeout: 10m

  # ── Mantle Private/Admin Network ───────────────────────────────
  # Tests that require admin keys (SystemConfigOwner, GPO operator),
  # infrastructure control (Stop/Start nodes, ControlPlane, TimeTravel),
  # or specialized services (Faucet service, SyncTester, Conductor).

  - id: mantle-private
    description: "Mantle tests requiring admin keys or infrastructure control — only for controlled environments."
    tests:
      # Arsia — require SystemConfigOwner or SetOperatorFee
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestFees
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestOperatorFee
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestMinBaseFee
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestDAFootprint
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_VsActualCost
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/arsia
        name: TestEstimateTotalFee_OperatorFee
        timeout: 10m
      # Tokenratio — require GPO operator key
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/tokenratio
        timeout: 10m
      # Withdrawal — require TimeTravel (AdvanceTime for finalization)
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base/withdrawal
        timeout: 10m
      # Skadi — require Faucet service + Archive node
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/skadi
        timeout: 5m
      # Batcher — require ControlPlane, TestSequencer, Stop/Start
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/batcher
        timeout: 10m
      # Conductor — require ConductorSets
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/base/conductor
        timeout: 10m
      # Fusaka — require L1 blob spam + fork timing control
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/fusaka
        timeout: 10m
      # SafeHeadDB — require Stop/Start nodes
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/safeheaddb_clsync
        timeout: 10m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/safeheaddb_elsync
        timeout: 10m
  - id: mantle-onlysysgo
    description: "Mantle tests requiring admin keys or infrastructure control — only for controlled environments."
    tests:
      # Sync — require Stop/Start nodes
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync/unsafe_only
      - timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync/manual
      - timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync/clsync/gap_clp2p
      - timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync/elsync/gap_clp2p
      - timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync/elsync/gap_elp2p
      - timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync/elsync/reorg
      - timeout: 15m
      # DepReqRes — require node disconnection/reconnection
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/depreqres/reqressyncdisabled
        timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/depreqres/reqressyncdisabled/clsync
        timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/depreqres/reqressyncdisabled/elsync
        timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/depreqres/syncmodereqressync/clsync
        timeout: 15m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/depreqres/syncmodereqressync/elsync
        timeout: 15m
      # Sync tester — require SyncTester infrastructure
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync_tester/sync_tester_e2e
        timeout: 20m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync_tester/sync_tester_elsync
        timeout: 20m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync_tester/sync_tester_elsync_multi
        timeout: 20m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync_tester/sync_tester_hfs
        timeout: 20m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync_tester/sync_tester_ext_el
        timeout: 20m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync_tester/sync_tester_hfs_ext
        timeout: 20m
      - package: github.com/ethereum-optimism/optimism/op-acceptance-tests/mantle-tests/sync_tester/sync_tester_unsafe_only_ext
        timeout: 20m
